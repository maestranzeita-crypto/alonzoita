<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alonzo Ita — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Indie+Flower&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #ffffff;
      --bg-alt:    #f7f7f7;
      --bg-card:   #f2f2f2;
      --border:    #e4e4e4;
      --gold:      #c9a84c;
      --gold-dim:  rgba(201, 168, 76, 0.18);
      --text:      #111111;
      --muted:     #777777;
      --radius:    12px;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6vw;
      height: 56px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      overflow: visible;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    nav.hidden {
      transform: translateY(-100%);
      opacity: 0;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      font-weight: 700;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: -0.02em;
      mix-blend-mode: difference;
      line-height: 1;
      transform: rotate(180deg);
      position: absolute;
      top: 110%;
      left: 50%;
      translate: -50% -50%;
      white-space: nowrap;
    }

    .nav-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 6vw 6rem;
      position: relative;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: url('images/image00037.png') center center / cover no-repeat;
      filter: grayscale(1);
      z-index: 0;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      pointer-events: none;
      z-index: 1;
    }

    .hero > *:not(.hero-bg) {
      position: relative;
      z-index: 1;
    }

    .hero-portfolio-btn {
      display: inline-block;
      margin-top: 2rem;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 3px;
      transition: color 0.25s, border-color 0.25s;
    }

    .hero-portfolio-btn:hover {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.8);
    }

    .hero h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1.6rem, 4vw, 3rem);
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 0;
    }

    .hero-highlight {
      transition: color 0.25s;
      cursor: default;
    }

    @media (hover: hover) {
      .hero-highlight:hover {
        color: #e03030;
      }
    }

    .hero-highlight.touched {
      color: #e03030;
    }

    .hero-cta {
      display: inline-flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--gold);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #b8943d;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(201, 168, 76, 0.28);
    }

    .btn-outline {
      border: 1.5px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-2px);
    }

    /* ── SECTION COMMONS ── */
    section {
      padding: 7rem 6vw;
    }

    .section-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .section-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    .section-desc {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 460px;
      margin: 0 auto;
    }

    .divider {
      width: 36px;
      height: 2px;
      background: var(--gold);
      margin: 1rem auto 0;
      border-radius: 2px;
    }

    /* ── SITI WEB ── */
    #siti {
      background: #111111;
      padding: 0 0 7rem;
    }

    .project-featured {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .project-featured {
        grid-template-columns: 1fr;
      }
    }

    .project-card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 16 / 9;
    }

    .project-card video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(100%);
    }

    .video-poster-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      z-index: 1;
      transition: opacity 0.2s;
    }

    .project-card-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      transition: background 0.35s;
    }

    .project-card:hover .project-card-overlay {
      background: rgba(0, 0, 0, 0.38);
    }

    .project-logo-img {
      width: 180px;
      height: auto;
      object-fit: contain;
    }

    .project-logo {
      width: 280px;
      height: auto;
    }

    .hidden {
      position: absolute;
      width: 0;
      height: 0;
    }

    .project-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.04em;
    }

    .project-visit-btn {
      display: inline-block;
      padding: 0.75rem 2.5rem;
      border: 2px solid var(--gold);
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      transition: background 0.25s, color 0.25s;
    }

    .project-visit-btn:hover {
      background: var(--gold);
      color: #111111;
    }

    @media (max-width: 768px) {
      .project-card {
        aspect-ratio: 4 / 3;
      }
    }

    /* ── FOTOGRAFIE ── */
    #foto {
      background: var(--bg);
    }

    .carousel {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .carousel-track {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-slide {
      min-width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .carousel-slide img {
      width: 100%;
      height: 80vh;
      object-fit: cover;
      display: block;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      translate: 0 -50%;
      z-index: 10;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s;
    }

    .carousel-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .carousel-btn.prev { left: 1rem; }
    .carousel-btn.next { right: 1rem; }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }

    .carousel-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
    }

    .carousel-dot.active {
      background: var(--gold);
      transform: scale(1.3);
    }

    /* ── ABOUT ── */
    #about {
      background: var(--bg-alt);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 5rem 6vw;
    }

    .about-inner {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .about-text h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      color: var(--text);
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .about-text p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }

    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .skill-tag {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      transition: border-color 0.25s, color 0.25s;
    }

    .skill-tag:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .stat-box:hover {
      border-color: var(--gold);
      box-shadow: 0 4px 20px rgba(201, 168, 76, 0.1);
    }

    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.35rem;
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── FOOTER ── */
    footer {
      padding: 4rem 6vw 3rem;
      text-align: center;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .footer-contact a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1.5px solid var(--gold-dim);
      padding-bottom: 3px;
      transition: color 0.25s, border-color 0.25s;
    }

    .footer-contact a:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    .footer-contact-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav {
        padding: 0 4vw;
        height: 48px;
      }

      .nav-logo {
        font-size: 4rem;
        top: 105%;
        left: 50%;
      }

      .carousel-slide img {
        height: auto;
        aspect-ratio: 1 / 1;
        width: 100%;
        object-fit: cover;
      }

      .photo-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(3, 200px);
      }

      .about-inner {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }

      .about-stats {
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
      }
    }

    @media (max-width: 480px) {
      .photo-grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(6, 180px);
      }

      .about-stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero-cta {
        flex-direction: column;
        align-items: center;
      }
    }

    /* ── LIGHTBOX ── */
    .carousel-slide img {
      cursor: zoom-in;
    }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.93);
      align-items: center;
      justify-content: center;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox-img-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #lbImg {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transform-origin: center center;
      transition: transform 0.15s ease;
      user-select: none;
      -webkit-user-drag: none;
      cursor: grab;
    }

    #lbImg.dragging {
      cursor: grabbing;
      transition: none;
    }

    #lbClose {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #lbClose:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    #lbZoomHint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      translate: -50% 0;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.45);
      pointer-events: none;
      text-transform: uppercase;
    }
    /* ── GEAR / CERCHIO ANIMATO ── */
    .hero {
      position: relative;
      z-index: 2;
    }

    /* contenitore blend: position:relative senza z-index → non crea stacking context */
    .blend-header {
      position: relative;
      background: #111111;
      text-align: center;
      padding: 6rem 6vw 4rem;
      overflow: visible;
    }

    /* SVG col centro sul bordo superiore di #siti → visivamente tra le due sezioni */
    #gears {
      position: absolute;
      top: 0;
      left: 50%;
      translate: -50% -50%;
      width: 700px;
      height: 700px;
      overflow: visible;
      transform-origin: center;
      animation: gearCCW 60s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    #gears #g2 {
      transform-origin: center;
      animation: gearCW 15s linear infinite;
    }

    .mbm {
      mix-blend-mode: difference;
    }

    /* section-header: solo position:relative, NO z-index → non crea stacking context
       così i figli operano nel body stacking context e vedono l'SVG sottostante */
    #siti .section-header {
      position: relative;
    }

    /* z-index:2 + mix-blend-mode direttamente su titolo e desc:
       creano stacking context nel body stacking context, sopra l'SVG (z-index:1) */
    #siti .section-title {
      color: #ffffff;
      position: relative;
      z-index: 2;
      text-transform: uppercase;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 18vw, 12rem);
      letter-spacing: 0.25em;
      line-height: 1;
    }

    #siti .section-desc {
      color: #ffffff;
      position: relative;
      z-index: 2;
    }

    @keyframes gearCW {
      to { transform: rotate(360deg); }
    }

    @keyframes gearCCW {
      to { transform: rotate(-360deg); }
    }

    @media (max-width: 480px) {
      #gears {
        width: 420px;
        height: 420px;
      }
      .blend-header {
        padding-top: 5rem;
      }
    }

    /* ── SCRIVIMI DAI ── */
    .scrivimi-banner {
      position: relative;
      background: linear-gradient(to bottom, #111111 50%, #ffffff 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3.5rem 6vw;
      isolation: isolate;
      overflow: hidden;
      cursor: pointer;
    }

    .scrivimi-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 13vw, 9rem);
      font-weight: 700;
      color: #ffffff;
      mix-blend-mode: difference;
      letter-spacing: -0.02em;
      white-space: nowrap;
      position: relative;
      z-index: 1;
      line-height: 1;
      user-select: none;
      transform: translateY(-15%);
    }

    /* hover layer */
    .scrivimi-hover-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 2;
    }

    .scrivimi-banner:hover .scrivimi-hover-layer,
    .scrivimi-banner.touched .scrivimi-hover-layer {
      opacity: 1;
    }

    .arrows-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .ap {
      fill: none;
      stroke: #e03030;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
    }

    .scrivimi-banner:hover .ap,
    .scrivimi-banner.touched .ap { animation: drawA 0.55s ease forwards; }
    .scrivimi-banner:hover .ap:nth-child(1), .scrivimi-banner.touched .ap:nth-child(1) { animation-delay: 0.00s; }
    .scrivimi-banner:hover .ap:nth-child(2), .scrivimi-banner.touched .ap:nth-child(2) { animation-delay: 0.11s; }
    .scrivimi-banner:hover .ap:nth-child(3), .scrivimi-banner.touched .ap:nth-child(3) { animation-delay: 0.22s; }
    .scrivimi-banner:hover .ap:nth-child(4), .scrivimi-banner.touched .ap:nth-child(4) { animation-delay: 0.33s; }
    .scrivimi-banner:hover .ap:nth-child(5), .scrivimi-banner.touched .ap:nth-child(5) { animation-delay: 0.44s; }

    @keyframes drawA {
      to { stroke-dashoffset: 0; }
    }

    .clicca-testo {
      position: absolute;
      bottom: 4%;
      left: 38%;
      transform: translateX(-50%);
      font-family: 'Indie Flower', cursive;
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      font-weight: 700;
      color: #e03030;
      white-space: nowrap;
      clip-path: inset(0 100% 0 0);
    }

    .scrivimi-banner:hover .clicca-testo,
    .scrivimi-banner.touched .clicca-testo {
      animation: revealWrite 0.7s ease forwards;
      animation-delay: 0.75s;
    }

    @keyframes revealWrite {
      to { clip-path: inset(0 0% 0 0); }
    }


    @media (max-width: 480px) {
      .scrivimi-banner {
        padding: 2.5rem 4vw;
      }
      .clicca-testo {
        left: 36%;
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="#" class="nav-logo">alonzoita.com</a>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>
    <h1><span class="hero-highlight">mi piace</span> fare foto e creare siti</h1>
    <a href="#siti" class="hero-portfolio-btn">Portfolio</a>
  </section>

  <!-- SITI WEB -->
  <section id="siti">
    <!-- .blend-header: contenitore con position:relative + background:black, senza isolation -->
    <div class="blend-header">
      <!-- SVG posizionato absolute z-index:1, fratello diretto del testo -->
      <svg id="gears" width="700" height="700" viewBox="0 0 400 400">
        <circle cx="200" cy="200" r="100" fill="none" stroke="#2a2a2a" stroke-width="200" stroke-dasharray="4.3 4.3" />
        <g id="g2" fill="#2a2a2a" stroke="none" class="mbm">
          <circle cx="170" cy="200" r="170" />

    // ── Video cards: hover su desktop, tieni premuto su mobile ──
    document.querySelectorAll('.project-card').forEach(card => {
      const video = card.querySelector('video');
      if (!video) return;

      card.addEventListener('mouseenter', () => { video.currentTime = 0; video.play(); });
      card.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });

      let holdTimer = null;
      let touchStartY = 0;
      let isPlaying = false;

      card.addEventListener('touchstart', e => {
        touchStartY = e.touches[0].clientY;
        holdTimer = setTimeout(() => {
          isPlaying = true;
          video.currentTime = 0;
          video.play();
        }, 150);
      }, { passive: true });

      card.addEventListener('touchmove', e => {
        if (holdTimer && !isPlaying) {
          if (Math.abs(e.touches[0].clientY - touchStartY) > 8) {
            clearTimeout(holdTimer);
            holdTimer = null;
          }
        }
      }, { passive: true });

      card.addEventListener('touchend', () => {
        clearTimeout(holdTimer);
        holdTimer = null;
        if (isPlaying) { video.pause(); video.currentTime = 0; }
        isPlaying = false;
      });

      card.addEventListener('touchcancel', () => {
        clearTimeout(holdTimer);
        holdTimer = null;
        if (isPlaying) { video.pause(); video.currentTime = 0; }
        isPlaying = false;
      });
    });

    // ── Hero highlight touch ──
    document.querySelector('.hero-highlight').addEventListener('click', function() {
      this.classList.add('touched');
      setTimeout(() => this.classList.remove('touched'), 1500);
    });

    // ── Carosello ──
    const track = document.getElementById('carouselTrack');
    const dots = document.querySelectorAll('.carousel-dot');
    let current = 0;
    const total = 3;
    let swipeHandled = false;

    function goTo(index) {
      current = (index + total) % total;
      track.style.transform = `translateX(-${current * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
    }

    document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
    document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));
    dots.forEach((d, i) => d.addEventListener('click', () => goTo(i)));

    // Swipe touch sul carosello
    let swipeStartX = 0;
    track.addEventListener('touchstart', e => {
      swipeStartX = e.touches[0].clientX;
      swipeHandled = false;
    });
    track.addEventListener('touchend', e => {
      const diff = swipeStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) {
        swipeHandled = true;
        goTo(diff > 0 ? current + 1 : current - 1);
      }
    });

    // ── Nav hide on scroll ──
    const nav = document.querySelector('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('hidden', window.scrollY > 10);
    });

    // ── Lightbox ──
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbWrap = document.getElementById('lightbox-img-wrap');

    // Apri lightbox al click su immagini carosello
    document.querySelectorAll('.carousel-slide img').forEach(img => {
      img.addEventListener('click', () => {
        if (swipeHandled) return;
        lbImg.src = img.src;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
        resetZoom();
      });
    });

    // Chiudi
    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    lbWrap.addEventListener('click', e => {
      if (e.target === lbWrap) closeLightbox();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      resetZoom();
    }

    // ── Zoom state ──
    let scale = 1, lastScale = 1;
    let posX = 0, posY = 0;
    let pinchStartDist = 0;

    function resetZoom() {
      scale = 1; lastScale = 1; posX = 0; posY = 0;
      lbImg.style.transition = 'transform 0.2s ease';
      lbImg.style.transform = 'scale(1) translate(0px, 0px)';
    }

    function applyTransform(animated) {
      lbImg.style.transition = animated ? 'transform 0.15s ease' : 'none';
      lbImg.style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
    }

    // Pinch-to-zoom e pan
    let touchStartX = 0, touchStartY = 0;
    let lastTap = 0;

    lbImg.addEventListener('touchstart', e => {
      e.stopPropagation();
      if (e.touches.length === 2) {
        pinchStartDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        lastScale = scale;
      } else if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX - posX * scale;
        touchStartY = e.touches[0].clientY - posY * scale;
      }
    }, { passive: true });

    lbImg.addEventListener('touchmove', e => {
      e.preventDefault();
      e.stopPropagation();
      if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        scale = Math.min(Math.max(lastScale * (dist / pinchStartDist), 1), 5);
        applyTransform(false);
      } else if (e.touches.length === 1 && scale > 1) {
        posX = (e.touches[0].clientX - touchStartX) / scale;
        posY = (e.touches[0].clientY - touchStartY) / scale;
        applyTransform(false);
      }
    }, { passive: false });

    lbImg.addEventListener('touchend', e => {
      e.stopPropagation();
      // Doppio tap per zoom/reset
      const now = Date.now();
      if (now - lastTap < 280 && e.changedTouches.length === 1) {
        if (scale > 1) {
          resetZoom();
        } else {
          scale = 2.5;
          posX = 0; posY = 0;
          applyTransform(true);
        }
      }
      lastTap = now;
      // Rimetti in bounds se sotto scala 1
      if (scale < 1) { scale = 1; posX = 0; posY = 0; applyTransform(true); }
    });

    // Zoom con scroll mouse (desktop)
    lbImg.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 1.15 : 0.87;
      scale = Math.min(Math.max(scale * delta, 1), 5);
      if (scale === 1) { posX = 0; posY = 0; }
      applyTransform(false);
    }, { passive: false });

    // Pan con mouse (desktop)
    let mouseDown = false, mStartX = 0, mStartY = 0;
    lbImg.addEventListener('mousedown', e => {
      if (scale <= 1) return;
      mouseDown = true;
      lbImg.classList.add('dragging');
      mStartX = e.clientX - posX * scale;
      mStartY = e.clientY - posY * scale;
    });
    window.addEventListener('mousemove', e => {
      if (!mouseDown) return;
      posX = (e.clientX - mStartX) / scale;
      posY = (e.clientY - mStartY) / scale;
      applyTransform(false);
    });
    window.addEventListener('mouseup', () => {
      mouseDown = false;
      lbImg.classList.remove('dragging');
    });

    // ── LETTER ANIMATION CARD 4 ──
    (function () {
      const card  = document.getElementById('card4');
      const label = document.getElementById('ink-text');
      if (!card || !label) return;

      const PHRASE = 'il prossimo progetto è il tuo';
      const WORDS  = ['sport','mistero','oro','tuo','mio','metro','motori'];
      const COLORS = ['#f97316','#7c3aed','#c9a84c','#0891b2','#be185d','#10b981','#dc2626'];

      function buildSpans() {
        label.innerHTML = '';
        const spans = [];
        for (const ch of PHRASE) {
          if (ch === ' ') {
            label.appendChild(document.createTextNode('\u00A0'));
          } else {
            const s = document.createElement('span');
            s.textContent = ch;
            s.style.cssText = 'display:inline-block;transition:opacity .2s;';
            label.appendChild(s);
            spans.push({ el: s, char: ch === 'è' ? 'e' : ch });
          }
        }
        return spans;
      }

      function findIndices(spans, word, taken) {
        const idxs = [];
        for (const ch of word) {
          const i = spans.findIndex((s, j) => s.char === ch && !taken.has(j));
          if (i !== -1) { taken.add(i); idxs.push(i); }
        }
        return idxs;
      }

      function rel(el) {
        const er = el.getBoundingClientRect();
        const cr = card.getBoundingClientRect();
        return { x: er.left - cr.left + er.width / 2, y: er.top - cr.top + er.height / 2 };
      }

      function animateWord(spans, word, color, done) {
        const taken  = new Set();
        const idxs   = findIndices(spans, word, taken);
        if (!idxs.length) { done(); return; }

        const cr     = card.getBoundingClientRect();
        const orig   = idxs.map(i => rel(spans[i].el));
        const CH     = 16;
        const totalW = word.length * CH;
        const tx0    = (cr.width - totalW) / 2 + CH / 2;
        const ty     = cr.height * 0.32;

        idxs.forEach(i => { spans[i].el.style.opacity = '0'; });

        const clones = idxs.map((idx, i) => {
          const c = document.createElement('span');
          c.textContent = spans[idx].el.textContent;
          c.style.cssText = `
            position:absolute;pointer-events:none;z-index:30;
            font-family:'Inter',sans-serif;font-weight:300;
            font-size:.95rem;letter-spacing:.12em;text-transform:uppercase;
            color:#ffffff;
            left:${orig[i].x}px;top:${orig[i].y}px;
            transform:translate(-50%,-50%);
            transition:left .55s cubic-bezier(.34,1.56,.64,1),
                       top  .55s cubic-bezier(.34,1.56,.64,1),
                       color .35s ease, font-size .4s ease;
          `;
          card.appendChild(c);
          return c;
        });

        // fly out staggered
        clones.forEach((c, i) => {
          setTimeout(() => {
            c.style.left     = (tx0 + i * CH) + 'px';
            c.style.top      = ty + 'px';
            c.style.fontSize = '1.35rem';
          }, i * 35);
        });

        // color when formed
        setTimeout(() => {
          clones.forEach(c => { c.style.color = color; });
        }, 720);

        // return staggered
        setTimeout(() => {
          clones.forEach((c, i) => {
            setTimeout(() => {
              c.style.transition = 'left .45s cubic-bezier(.34,1.56,.64,1),top .45s cubic-bezier(.34,1.56,.64,1),color .3s,font-size .3s';
              c.style.left      = orig[i].x + 'px';
              c.style.top       = orig[i].y + 'px';
              c.style.fontSize  = '.95rem';
              c.style.color     = '#ffffff';
            }, i * 28);
          });
        }, 1450);

        // cleanup
        setTimeout(() => {
          clones.forEach(c => c.remove());
          idxs.forEach(i => { spans[i].el.style.opacity = '1'; });
          done();
        }, 2100);
      }

      let running = false;
      let wi = 0;
      let spans = buildSpans();

      function run() {
        if (running) return;
        running = true;
        const wordIdx = wi;
        wi = (wi + 1) % WORDS.length;
        animateWord(spans, WORDS[wordIdx], COLORS[wordIdx % COLORS.length], () => {
          running = false;
        });
      }

      card.addEventListener('mouseenter', run);
    })();



    // ── Scrivimi banner: su touch → parte allo scroll, sparisce dopo 5s ──
    (function () {
      const banner = document.querySelector('.scrivimi-banner');
      if (!banner) return;
      if (!window.matchMedia('(hover: none)').matches) return;

      var timer = null;
      function trigger() {
        if (banner.classList.contains('touched')) return;
        banner.classList.add('touched');
        clearTimeout(timer);
        timer = setTimeout(function () {
          banner.classList.remove('touched');
          timer = setTimeout(trigger, 3000);
        }, 5000);
      }

      var observer = new IntersectionObserver(function (entries) {
        if (entries[0].isIntersecting) trigger();
      }, { threshold: 0.35 });
      observer.observe(banner);
    })();

  </script>
</body>
</html>
